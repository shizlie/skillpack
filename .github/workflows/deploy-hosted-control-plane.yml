name: Verify Hosted Control Plane

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SKILLPACK_API_BASE_URL: ${{ vars.SKILLPACK_API_BASE_URL }}
      SKILLPACK_DASHBOARD_ORIGIN: ${{ vars.SKILLPACK_DASHBOARD_ORIGIN }}
      SKILLPACK_API_KEY: ${{ secrets.SKILLPACK_API_KEY }}
      SMOKE_API_AUTH_HEADER: ${{ secrets.SMOKE_API_AUTH_HEADER }}
      SMOKE_DASHBOARD_AUTH_HEADER: ${{ secrets.SMOKE_DASHBOARD_AUTH_HEADER }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test apps/api/test/worker.test.js apps/dashboard/test/worker.test.js
      - run: bun scripts/deploy/check-hosted-deploy-env.mjs
      - run: >
          bun scripts/deploy/smoke-hosted-control-plane.mjs
          --api-base-url=${SKILLPACK_API_BASE_URL}
          --dashboard-base-url=${SKILLPACK_DASHBOARD_ORIGIN}
          --api-key=${SKILLPACK_API_KEY}
          ${SMOKE_API_AUTH_HEADER:+--api-auth-header="${SMOKE_API_AUTH_HEADER}"}
          --run-id=${GITHUB_RUN_ID}
          ${SMOKE_DASHBOARD_AUTH_HEADER:+--dashboard-auth-header="${SMOKE_DASHBOARD_AUTH_HEADER}"}
