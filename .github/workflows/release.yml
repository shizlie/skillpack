name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Write signing keys
        run: |
          mkdir -p verticals/laws-consultant/distribution/keys
          printf '%s' "$PRIVATE_KEY" > verticals/laws-consultant/distribution/keys/prod-private.pem
          printf '%s' "$PUBLIC_KEY"  > verticals/laws-consultant/distribution/keys/prod-public.pem
          chmod 600 verticals/laws-consultant/distribution/keys/prod-private.pem
        env:
          PRIVATE_KEY: ${{ secrets.LAWS_CONSULTANT_PRIVATE_KEY }}
          PUBLIC_KEY: ${{ secrets.LAWS_CONSULTANT_PUBLIC_KEY }}

      - name: Write release license template
        run: |
          cat > verticals/laws-consultant/distribution/license.dev.json <<'EOF'
          {
            "licenseId": "laws-consultant-release-license",
            "customerId": "demo-customer",
            "seatId": "default",
            "bundleId": "laws-consultant",
            "policy": {
              "ttlDays": 30,
              "graceHours": 72,
              "metering": "required"
            },
            "notes": "Default release license. Replace customerId/seatId per-customer when issuing real leases."
          }
          EOF

      - name: Run tests
        run: |
          bun run test:unit
          bun run --cwd apps/self-hosted test

      - name: Build bundle
        run: >
          SKILLPACK_BUNDLE_PRIVATE_KEY_PATH=verticals/laws-consultant/distribution/keys/prod-private.pem
          SKILLPACK_BUNDLE_PUBLIC_KEY_PATH=verticals/laws-consultant/distribution/keys/prod-public.pem
          bun run bundle:laws-consultant

      - name: Extract version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build CLI/runtime distributable artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/packages"

          # Standalone Linux binaries for operators (no repo clone required)
          bun build --compile --target=bun-linux-x64 apps/cli/src/cli.js \
            --outfile "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-linux-x64"
          bun build --compile --target=bun-linux-x64 packages/runtime/src/server.mjs \
            --outfile "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-linux-x64"
          chmod +x "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-linux-x64"
          chmod +x "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-linux-x64"

          # Source bundle for users who prefer auditable/rebuildable workspace installs
          mkdir -p "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/packages"
          mkdir -p "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/apps"
          cp package.json "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/package.json"
          cp bun.lock "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/bun.lock"
          cp -R apps/cli "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/apps/cli"
          cp -R packages/core "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/packages/core"
          cp -R packages/crypto "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/packages/crypto"
          cp -R packages/tsa "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/packages/tsa"
          cp -R packages/protocol "dist/releases/v${VERSION}/src/skillpack-cli-${VERSION}/packages/protocol"
          tar -czf "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-source.tar.gz" \
            -C "dist/releases/v${VERSION}/src" "skillpack-cli-${VERSION}"

          # Runtime source bundle (plain Node.js runtime server files)
          mkdir -p "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}"
          cp packages/runtime/src/server.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/server.mjs"
          cp packages/runtime/src/server-util.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/server-util.mjs"
          cp packages/runtime/src/wiki-rag-shared.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/wiki-rag-shared.mjs"
          cp packages/runtime/src/runtime-meter.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/runtime-meter.mjs"
          cp packages/runtime/src/local-meter-client.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/local-meter-client.mjs"
          cp packages/runtime/src/meter-store.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/meter-store.mjs"
          cp packages/runtime/src/direct-upload-transport.mjs "dist/releases/v${VERSION}/src/skillpack-runtime-${VERSION}/direct-upload-transport.mjs"
          tar -czf "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-source.tar.gz" \
            -C "dist/releases/v${VERSION}/src" "skillpack-runtime-${VERSION}"

          # Integrity checksums
          sha256sum "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-linux-x64" > \
            "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-linux-x64.sha256"
          sha256sum "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-linux-x64" > \
            "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-linux-x64.sha256"
          sha256sum "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-source.tar.gz" > \
            "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-source.tar.gz.sha256"
          sha256sum "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-source.tar.gz" > \
            "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-source.tar.gz.sha256"

      - name: Publish self-hosted npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun run --cwd apps/self-hosted build:npm
          npm publish apps/self-hosted/dist/npm --access public --tag latest

      - name: Publish self-hosted container image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/skillpack-self-hosted
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            -f apps/self-hosted/Dockerfile \
            -t "${IMAGE}:v${VERSION}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:v${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Extract changelog entry
        id: notes
        run: |
          # Extract the changelog block for this version
          awk '/^## \['"${{ steps.version.outputs.version }}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            "dist/skills/laws-consultant-${VERSION}-bundle.tar.gz" \
            "dist/skills/laws-consultant-${VERSION}-bundle.tar.gz.sha256" \
            "dist/skills/laws-consultant-${VERSION}/laws-consultant-${VERSION}.public.pem" \
            "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-linux-x64" \
            "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-linux-x64.sha256" \
            "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-linux-x64" \
            "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-linux-x64.sha256" \
            "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-source.tar.gz" \
            "dist/releases/v${VERSION}/skillpack-cli-${VERSION}-source.tar.gz.sha256" \
            "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-source.tar.gz" \
            "dist/releases/v${VERSION}/skillpack-runtime-${VERSION}-source.tar.gz.sha256"
